services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    build: .
    restart: unless-stopped
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 1
      --timeout 30
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD}
      DJANGO_REFERRER_POLICY: ${DJANGO_REFERRER_POLICY}
      DJANGO_DATA_UPLOAD_MAX_MEMORY_SIZE: ${DJANGO_DATA_UPLOAD_MAX_MEMORY_SIZE}
      DJANGO_FILE_UPLOAD_MAX_MEMORY_SIZE: ${DJANGO_FILE_UPLOAD_MAX_MEMORY_SIZE}
      DATABASE_URL: ${DATABASE_URL}
      URLBREVE_ANONYMOUS_API_ENABLED: ${URLBREVE_ANONYMOUS_API_ENABLED}
      URLBREVE_RATE_LIMITING_ENABLED: ${URLBREVE_RATE_LIMITING_ENABLED}
      URLBREVE_ANONYMOUS_DAILY_LIMIT: ${URLBREVE_ANONYMOUS_DAILY_LIMIT}
      URLBREVE_AUTHENTICATED_DAILY_LIMIT: ${URLBREVE_AUTHENTICATED_DAILY_LIMIT}
      URLBREVE_API_KEY_DAILY_LIMIT: ${URLBREVE_API_KEY_DAILY_LIMIT}
      URLBREVE_REPORT_SESSION_DAILY_LIMIT: ${URLBREVE_REPORT_SESSION_DAILY_LIMIT}
      URLBREVE_REPORT_HONEYPOT_ENABLED: ${URLBREVE_REPORT_HONEYPOT_ENABLED}
      URLBREVE_PASSWORD_GATE_SESSION_LIMIT: ${URLBREVE_PASSWORD_GATE_SESSION_LIMIT}
      URLBREVE_PASSWORD_GATE_LINK_COOLDOWN_ENABLED: ${URLBREVE_PASSWORD_GATE_LINK_COOLDOWN_ENABLED}
      URLBREVE_PASSWORD_GATE_LINK_COOLDOWN_LIMIT: ${URLBREVE_PASSWORD_GATE_LINK_COOLDOWN_LIMIT}
      URLBREVE_PASSWORD_GATE_LINK_COOLDOWN_SECONDS: ${URLBREVE_PASSWORD_GATE_LINK_COOLDOWN_SECONDS}
    expose:
      - "8000"
    volumes:
      - staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/urlbreve.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
    networks:
      - internal

volumes:
  postgres_data:
  staticfiles:

networks:
  internal:
